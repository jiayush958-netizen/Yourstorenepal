<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Store Nepal</title>
    <style>
        body { font-family: sans-serif; background-color: #f1f3f6; margin: 0; }
        header { background: #2874f0; padding: 12px; color: white; display: flex; align-items: center; position: sticky; top: 0; }
        .search-bar { background: white; flex: 1; margin: 0 10px; padding: 8px; border-radius: 2px; color: #999; font-size: 14px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: white; padding: 10px; text-align: center; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 140px; object-fit: contain; }
        .p-name { font-size: 13px; color: #212121; margin: 8px 0; height: 32px; overflow: hidden; }
        .p-price { font-weight: bold; font-size: 15px; }
        .off { color: #388e3c; font-size: 12px; }
        .btn { background: #fb641b; color: white; border: none; width: 100%; padding: 8px; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-style:italic;">YourStore</div>
    <div class="search-bar">Search for products...</div>
</header>

<div class="container">
    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71p-D-l8XHL._SL1500_.jpg" alt="Perfume">
        <div class="p-name">Premium Luxury Perfume</div>
        <div class="p-price">Rs. 1,299 <span class="off">40% off</span></div>
        <button class="btn">BUY NOW</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61S9A6K8fFL._SL1500_.jpg" alt="Perfume">
        <div class="p-name">Strong Oud Fragrance</div>
        <div class="p-price">Rs. 899 <span class="off">20% off</span></div>
        <button class="btn">BUY NOW</button>
    </div>
</div>

</body>
</html>
